services:
  - type: web
    name: etaxids-itin
    runtime: node
    plan: starter
    autoDeployTrigger: commit
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    domains:
      - etaxids.com
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://etaxids.com
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_SECRET
        generateValue: true
      - key: BUSINESS_NAME
        value: ETAX IDS ITIN Assistance Service
      - key: BRAND_NAME
        value: ETAX IDS
      - key: BUSINESS_ADDRESS
        value: Business address available upon request
      - key: PRIVACY_EFFECTIVE_DATE
        value: March 30, 2026
      - key: TERMS_EFFECTIVE_DATE
        value: March 30, 2026
      - key: SERVICES_PRICING_EFFECTIVE_DATE
        value: March 30, 2026
      - key: GOVERNING_STATE
        value: California
      - key: SERVICE_FEE_DISPLAY
        value: $149
      - key: SUPPORT_EMAIL
        value: contact@etaxids.com
      - key: CONTACT_NOTIFICATION_TO
        value: contact@etaxids.com
      - key: SUPPORT_PHONE
        value: (800) 555-0148
      - key: SUPPORT_HOURS
        value: Monday-Friday, 9 AM-5 PM PST
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: contact@etaxids.com
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: ETAX IDS ITIN Assistance Service <contact@etaxids.com>
